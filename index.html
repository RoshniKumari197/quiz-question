<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quize Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- <link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,
    200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic
    ,800,800italic,900,900italic" rel="stylesheet" /> -->
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge with this fun question</p>
            <button id="start-btn">Start Quiz</button>
        </div>

        <div class="screen question" id="question-screen">
            <p id="questions">question</p>
            <div class="question-info">
                <p>
                    Question <span id="question-no">1</span> of <span id="total-question">5</span>
                </p>
                <p>
                    Score: <span id="score">1</span>
                </p>
            </div>
            <div class="answer-container" id="answer-container">

            </div>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>

        <div class="screen result" id="result-screen">
          <h1>Quiz Result</h1>
          <div class="result-info">
            <p>
                yor scored <span id="final-score">0</span> out of <span id="max-score">5</span>
            </p>
            <div id="messege">
                keep going
            </div>
          </div>
         <button id="result-btn">Restart Quiz</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
